<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <radialGradient id="bg_glow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#14142a" />
      <stop offset="100%" stop-color="#0a0a0f" />
    </radialGradient>
  </defs>
  
  <!-- Beautiful Rounded Background -->
  <rect x="0" y="0" width="512" height="512" rx="120" fill="url(#bg_glow)" />
  
  <!-- Stylish Border Glow -->
  <rect x="16" y="16" width="480" height="480" rx="104" stroke="url(#grad)" stroke-width="8" opacity="0.5" fill="none" />
  
  <!-- Coding symbols { >_ } -->
  <g filter="url(#glow)">
    <!-- Left Brace -->
    <path d="M170 140 C125 140 125 175 125 175 L125 240 C125 256 105 256 105 256 C105 256 125 256 125 272 L125 337 C125 337 125 372 170 372" stroke="url(#grad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Right Brace -->
    <path d="M342 140 C387 140 387 175 387 175 L387 240 C387 256 407 256 407 256 C407 256 387 256 387 272 L387 337 C387 337 387 372 342 372" stroke="url(#grad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Greater Than -->
    <path d="M220 210 L275 256 L220 302" stroke="url(#grad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Underscore -->
    <line x1="285" y1="302" x2="335" y2="302" stroke="url(#grad)" stroke-width="32" stroke-linecap="round" />
  </g>
</svg>
